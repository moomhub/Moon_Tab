name: Deploy to Microsoft Partner Center

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  MPC_CLIENT_ID: "${{ secrets.MPC_CLIENT_ID }}"
  MPC_API_KEY: "${{ secrets.MPC_API_KEY }}"
  MPC_PRODUCT_ID: "${{ secrets.MPC_PRODUCT_ID }}"
  MPC_API_BASE: "https://api.addons.microsoftedge.microsoft.com/v1"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. 安装 pnpm（由 pnpm 官方 action 管理缓存）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4. 安装依赖（使用 pnpm 本地缓存，速度快）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # 5. 构建
      - name: Build project
        run: pnpm run build:linux

      # 6. 校验打包结果
      - name: Validate build output
        run: |
          if [ ! -f "dist.zip" ]; then
            echo "❌ dist.zip not found!"
            exit 1
          fi
          size=$(stat -c%s dist.zip)
          if [ "$size" -eq 0 ]; then
            echo "❌ dist.zip is empty!"
            exit 1
          fi
          echo "✅ dist.zip size: $size bytes"

      # 7. 校验环境变量
      - name: Validate environment variables
        run: |
          missing=()
          for var in MPC_CLIENT_ID MPC_API_KEY MPC_PRODUCT_ID; do
            if [ -z "${!var}" ]; then missing+=($var); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing env vars: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required env vars are set"

      # 8. 上传扩展包
      - name: Upload package to MPC
        run: |
          chmod +x .github/scripts/retry_request.sh .github/scripts/check_status.sh
          echo "📤 Uploading package..."
          CMD="curl --fail-with-body -sS -D headers.txt -o upload.json \
            -X POST \
            -H 'Authorization: ApiKey $MPC_API_KEY' \
            -H 'X-ClientID: $MPC_CLIENT_ID' \
            -H 'Content-Type: application/zip' \
            --data-binary @dist.zip \
            $MPC_API_BASE/products/$MPC_PRODUCT_ID/submissions/draft/package"
          .github/scripts/retry_request.sh "$CMD" 3 5
          cat headers.txt
          OPERATION_ID=$(grep -i location headers.txt | awk -F/ '{print $NF}' | tr -d '\r\n')
          echo "Upload operation ID: $OPERATION_ID"

          echo "⏳ Waiting for upload to complete..."
          .github/scripts/check_status.sh "$OPERATION_ID" \
            "$MPC_API_BASE/products/$MPC_PRODUCT_ID/submissions/draft/package/operations" \
            "$MPC_API_KEY" "$MPC_CLIENT_ID"

      # 9. 发布扩展
      - name: Publish submission
        run: |
          echo "🚀 Publishing submission..."
          CMD="curl --fail-with-body -sS -D headers.txt -o publish.json \
            -X POST \
            -H 'Authorization: ApiKey $MPC_API_KEY' \
            -H 'X-ClientID: $MPC_CLIENT_ID' \
            -H 'Content-Type: application/json' \
            -d '{\"notes\": \"Automated release - $(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}' \
            $MPC_API_BASE/products/$MPC_PRODUCT_ID/submissions"
          .github/scripts/retry_request.sh "$CMD" 3 5
          cat headers.txt
          PUBLISH_OPERATION_ID=$(grep -i location headers.txt | awk -F/ '{print $NF}' | tr -d '\r\n')
          echo "Publish operation ID: $PUBLISH_OPERATION_ID"

          echo "⏳ Waiting for publish to complete..."
          .github/scripts/check_status.sh "$PUBLISH_OPERATION_ID" \
            "$MPC_API_BASE/products/$MPC_PRODUCT_ID/submissions/operations" \
            "$MPC_API_KEY" "$MPC_CLIENT_ID"

          echo "✅ Extension published successfully!"

      # 10. 上传日志和产物
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpc-deploy-${{ github.sha }}
          path: |
            dist.zip
            upload.json
            publish.json
            headers.txt
          retention-days: 30
